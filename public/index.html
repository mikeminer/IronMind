<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronMind</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <div class="brand">
          <div class="mark">IM</div>
          <div>
            <h1>IronMind</h1>
            <p>CPU/RAM local inference</p>
          </div>
        </div>

        <label>
          Model
          <input id="model" value="qwen3-coder:30b" autocomplete="off">
        </label>

        <label>
          Context
          <input id="ctx" type="number" min="2048" step="2048" value="131072">
        </label>

        <label>
          Disk context
          <input id="kvDisk" value="loading..." readonly>
        </label>

        <label>
          CPU mode
          <input id="cpuMode" value="loading..." readonly>
        </label>

        <label class="check">
          <input id="think" type="checkbox">
          <span>Thinking</span>
        </label>

        <div class="status" id="status">Ready</div>
        <button id="clear" type="button">Clear chat</button>
      </aside>

      <section class="chat">
        <section class="clinical" aria-label="Clinical image triage">
          <div class="clinical-head">
            <div>
              <h2>Clinical Image Triage</h2>
              <p>CPU screening case review</p>
            </div>
            <label class="file-pick">
              <span>Image</span>
              <input id="clinicalFile" type="file" accept="image/png,image/jpeg,image/webp">
            </label>
          </div>

          <div class="clinical-grid">
            <div class="clinical-preview">
              <img id="clinicalPreview" alt="">
              <span id="clinicalPreviewEmpty">No image loaded</span>
            </div>
            <div class="clinical-controls">
              <label>
                Modality
                <select id="clinicalModality">
                  <option value="xray">X-ray</option>
                  <option value="ct">CT</option>
                  <option value="mri">MRI</option>
                  <option value="ultrasound">Ultrasound</option>
                  <option value="other">Other</option>
                </select>
              </label>
              <label>
                Body region
                <input id="clinicalRegion" value="chest" autocomplete="off">
              </label>
              <div class="clinical-actions">
                <button id="clinicalAnalyze" type="button" disabled>Run screening</button>
                <button id="clinicalDemo" type="button">Demo case</button>
                <button id="clinicalExport" type="button" disabled>Export case</button>
              </div>
            </div>
            <div class="clinical-result" id="clinicalResult">
              <div class="metric">
                <span>Quality</span>
                <strong id="qualityScore">-</strong>
              </div>
              <div class="metric">
                <span>Risk</span>
                <strong id="riskScore">-</strong>
              </div>
              <div class="metric">
                <span>Confidence</span>
                <strong id="confidenceScore">-</strong>
              </div>
              <div class="metric">
                <span>Uncertainty</span>
                <strong id="uncertaintyScore">-</strong>
              </div>
              <div class="metric">
                <span>Readiness</span>
                <strong id="qualityReadiness">-</strong>
              </div>
              <div class="metric">
                <span>Priority</span>
                <strong id="reviewPriority">-</strong>
              </div>
              <div class="metric">
                <span>Agreement</span>
                <strong id="agreementScore">-</strong>
              </div>
              <div class="metric">
                <span>Explainability</span>
                <strong id="explainabilityScore">-</strong>
              </div>
              <div class="quality-reasons" id="qualityReasons">Awaiting image.</div>
            </div>
          </div>
        </section>

        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <textarea id="prompt" rows="3" placeholder="Ask IronMind..." autofocus></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
