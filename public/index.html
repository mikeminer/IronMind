<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iurexa</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <div class="brand">
          <div class="mark">IX</div>
          <div>
            <h1>Iurexa</h1>
            <p>Supporto legale locale</p>
          </div>
        </div>

        <label>
          Assistente
          <input id="model" value="iurexa" autocomplete="off">
        </label>

        <label>
          Contesto
          <input id="ctx" type="number" min="2048" step="2048" value="131072">
        </label>

        <label>
          Memoria su disco
          <input id="kvDisk" value="loading..." readonly>
        </label>

        <label>
          Modalita CPU
          <input id="cpuMode" value="loading..." readonly>
        </label>

        <label class="check">
          <input id="think" type="checkbox">
          <span>Ragionamento</span>
        </label>

        <div class="status" id="status">Pronto</div>
        <button id="clear" type="button">Nuova chat</button>
      </aside>

      <section class="chat">
        <div id="messages" class="messages"></div>
        <form id="composer" class="composer">
          <textarea id="prompt" rows="3" placeholder="Descrivi il caso, il documento o la domanda legale..." autofocus></textarea>
          <button id="send" type="submit">Invia</button>
        </form>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
